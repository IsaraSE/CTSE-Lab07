<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Microservices Lab | SLIIT</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="glass-container">
        <header>
            <div class="logo">
                <span class="azure-icon">☁</span>
                <h1>Azure Microservices</h1>
            </div>
            <p class="subtitle">SLIIT Current Trends in Software Engineering</p>
        </header>

        <section class="api-status">
            <div class="status-card">
                <h3>Gateway Connection</h3>
                <div id="connection-indicator" class="indicator offline"></div>
                <span id="status-text">Checking connection...</span>
            </div>
        </section>

        <section class="action-panel">
            <button id="fetch-btn" class="primary-btn">Fetch API Message</button>
            <div id="response-box" class="response-box">
                <p class="placeholder">Response will appear here...</p>
            </div>
        </section>

        <footer>
            <div class="footer-info">
                <span>Lab 07: Azure Deployment</span>
                <span class="divider">|</span>
                <span id="timestamp"></span>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
